name: Publish container

on:
  workflow_dispatch:
    inputs:
      snapmaker_orca_version:
        description: "Snapmaker Orca release tag to build, for example v2.3.4. Leave blank for latest."
        required: false
        default: ""
      publish_latest:
        description: "Also publish the image as latest."
        required: true
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Build and publish container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve build metadata
        id: build_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.snapmaker_orca_version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_VERSION}" && ! "${INPUT_VERSION}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "snapmaker_orca_version may only contain letters, numbers, dots, underscores, and hyphens." >&2
            exit 1
          fi

          if [[ -n "${INPUT_VERSION}" ]]; then
            app_version="${INPUT_VERSION}"
          else
            app_version="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                https://api.github.com/repos/Snapmaker/OrcaSlicer/releases/latest \
                | jq -r '.tag_name'
            )"
          fi

          if [[ -z "${app_version}" || "${app_version}" == "null" ]]; then
            echo "Unable to resolve Snapmaker Orca release tag." >&2
            exit 1
          fi

          image_name="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          clean_tag="$(printf '%s' "${app_version}" | sed 's/[~,%@+;:/ ]//g')"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          {
            echo "image_name=${image_name}"
            echo "app_version=${app_version}"
            echo "clean_tag=${clean_tag}"
            echo "build_date=${build_date}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.build_meta.outputs.image_name }}
          labels: |
            org.opencontainers.image.title=Snapmaker Orca
            org.opencontainers.image.description=Snapmaker Orca containerized desktop slicer
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.licenses=GPL-3.0-only
          tags: |
            type=raw,value=${{ steps.build_meta.outputs.clean_tag }}
            type=raw,value=latest,enable=${{ inputs.publish_latest }}
            type=sha,prefix=sha-

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            SNAPMAKER_ORCA_VERSION=${{ steps.build_meta.outputs.app_version }}
            VERSION=${{ steps.build_meta.outputs.clean_tag }}
            BUILD_DATE=${{ steps.build_meta.outputs.build_date }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.build_meta.outputs.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
